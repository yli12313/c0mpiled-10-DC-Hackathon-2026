<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASA Exoplanet Query Interface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #050a18;
      --surface:  rgba(10, 20, 50, 0.7);
      --border:   rgba(0, 212, 255, 0.2);
      --cyan:     #00d4ff;
      --blue:     #4f8ef7;
      --purple:   #a855f7;
      --green:    #00ff88;
      --red:      #ff4f6a;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --glow-sm:  0 0 10px rgba(0,212,255,0.3);
      --glow-md:  0 0 20px rgba(0,212,255,0.4), 0 0 40px rgba(0,212,255,0.15);
      --glow-lg:  0 0 30px rgba(0,212,255,0.5), 0 0 60px rgba(0,212,255,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Video background ── */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.65;
      pointer-events: none;
    }

    /* subtle vignette so edges don't blow out and text stays readable */
    #bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse at center,
        rgba(5,10,24,0.15) 0%,
        rgba(5,10,24,0.7) 100%);
      pointer-events: none;
    }

    /* ── Starfield ── */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.15;
      pointer-events: none;
    }

    /* ── Layout ── */
    #app {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 48px 0 32px;
      gap: 12px;
      text-align: center;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* ── NASA logo image ── */
    .nasa-logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(0, 120, 255, 0.6));
      animation: logoFloat 6s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--cyan), var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,212,255,0.4));
    }

    .subtitle {
      font-size: 15px;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #f6d365, #fda085, #f6d365);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      filter: drop-shadow(0 0 12px rgba(253,160,133,0.5));
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    .stats-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .stat {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: var(--cyan);
      opacity: 0.7;
      letter-spacing: 1px;
    }

    .stat span { color: white; font-weight: 700; }

    /* ── Chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--cyan);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      font-family: 'Inter', sans-serif;
    }

    .chip:hover {
      border-color: var(--cyan);
      box-shadow: var(--glow-sm);
      background: rgba(0,212,255,0.08);
    }

    /* ── Input ── */
    .input-wrap {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
    }

    #question {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #question:focus {
      border-color: var(--cyan);
      box-shadow: var(--glow-sm);
    }

    #question::placeholder { color: var(--muted); }

    #submit {
      padding: 16px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      color: #050a18;
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--glow-sm);
      white-space: nowrap;
    }

    #submit:hover { box-shadow: var(--glow-md); transform: translateY(-1px); }
    #submit:active { transform: translateY(0); }
    #submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── History ── */
    #history { display: flex; flex-direction: column; gap: 28px; }

    /* ── Result card ── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-question {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-question::before {
      content: '›';
      color: var(--cyan);
      font-size: 18px;
      font-weight: 700;
    }

    .card-question-text { flex: 1; }

    .btn-delete {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 4px 7px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: var(--red);
      border-color: var(--red);
      box-shadow: 0 0 8px rgba(255,79,106,0.3);
    }

    .btn-csv {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      padding: 4px 9px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-csv:hover {
      color: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 8px rgba(0,255,136,0.3);
    }

    /* ── Answer ── */
    .card-answer {
      padding: 20px 24px;
      font-size: 16px;
      line-height: 1.7;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .card-answer.error { color: var(--red); }

    /* ── SQL panel ── */
    .sql-toggle {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      user-select: none;
      transition: color 0.2s;
      border-bottom: 1px solid transparent;
    }

    .sql-toggle:hover { color: var(--cyan); }

    .sql-toggle .arrow {
      transition: transform 0.2s;
      display: inline-block;
    }

    .sql-toggle.open .arrow { transform: rotate(90deg); }

    .sql-block {
      display: none;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
    }

    .sql-block.open { display: block; }

    pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* SQL syntax colors */
    .kw  { color: #569cd6; }
    .fn  { color: #dcdcaa; }
    .str { color: #ce9178; }
    .num { color: #b5cea8; }
    .cmt { color: #6a9955; font-style: italic; }
    .tbl { color: var(--cyan); }

    /* ── Results table ── */
    .table-wrap {
      overflow-x: auto;
      border-top: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr { background: rgba(0,212,255,0.05); }

    th {
      padding: 10px 16px;
      text-align: left;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--cyan);
      text-transform: uppercase;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(0,212,255,0.06);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      white-space: nowrap;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr:hover { background: rgba(0,212,255,0.04); }
    tbody tr:last-child td { border-bottom: none; }

    .row-count {
      padding: 10px 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-align: right;
    }

    /* ── Loading ── */
    .loading-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      backdrop-filter: blur(12px);
      animation: fadeUp 0.3s ease;
    }

    .orbit {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      position: relative;
    }

    .orbit-ring {
      width: 48px;
      height: 48px;
      border: 2px solid transparent;
      border-top-color: var(--cyan);
      border-right-color: rgba(0,212,255,0.3);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .orbit-dot {
      width: 8px;
      height: 8px;
      background: var(--cyan);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px var(--cyan);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      color: var(--cyan);
      letter-spacing: 2px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 8px 0;
    }
  </style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="/static/exoplanet-bg2.webm" type="video/webm" />
  <source src="/static/exoplanet-bg.webm" type="video/webm" />
</video>
<div id="bg-overlay"></div>

<canvas id="starfield"></canvas>

<div id="app">
  <header>
    <div class="logo-row">
      <img class="nasa-logo" src="/static/nasa-logo.png" alt="NASA" />
      <h1>Exoplanet Query Interface</h1>
    </div>
    <p class="subtitle">The universe has answers. Ask them.</p>
    <div class="stats-row">
      <div class="stat"><span>6,273</span> Confirmed Planets</div>
      <div class="stat">·</div>
      <div class="stat"><span>7,927</span> Candidates</div>
      <div class="stat">·</div>
      <div class="stat"><span>4,701</span> Stars</div>
      <div class="stat">·</div>
      <div class="stat"><span>1,473</span> Asteroid Events</div>
    </div>
  </header>

  <div class="chips" id="chips"></div>

  <div class="input-wrap">
    <input id="question" type="text" placeholder="Ask anything about exoplanets, asteroids, missions..." autocomplete="off" />
    <button id="submit">QUERY →</button>
  </div>

  <div id="history"></div>
</div>

<script>
// ── Starfield ──────────────────────────────────────────────
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = Array.from({ length: 220 }, () => ({
    x:    Math.random() * canvas.width,
    y:    Math.random() * canvas.height,
    r:    Math.random() * 1.4 + 0.2,
    base: Math.random() * 0.6 + 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.015 + 0.005,
  }));
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const alpha = s.base + Math.sin(t * s.speed + s.phase) * 0.3;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,220,255,${Math.max(0, alpha)})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}

resizeCanvas();
initStars();
requestAnimationFrame(drawStars);
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

// ── Suggested queries ─────────────────────────────────────
const CHIPS = [
  "Which mission discovered the most confirmed planets?",
  "Show me the top 10 closest asteroid approaches in 2024",
  "Find Earth-sized planets in the habitable zone",
  "How many TESS candidates are still unconfirmed?",
  "Which star has the most known planets?",
  "What are the fastest asteroids that passed Earth?",
  "Show planets discovered by each method over the years",
];

const chipsEl = document.getElementById('chips');
CHIPS.forEach(q => {
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.textContent = q;
  chip.onclick = () => { document.getElementById('question').value = q; submitQuery(); };
  chipsEl.appendChild(chip);
});

// ── SQL Syntax Highlight ──────────────────────────────────
function highlightSQL(sql) {
  const keywords = /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP\s+BY|ORDER\s+BY|HAVING|LIMIT|OFFSET|AS|AND|OR|NOT|IN|IS|NULL|BETWEEN|LIKE|ILIKE|DISTINCT|COUNT|SUM|AVG|MIN|MAX|ROUND|CAST|COALESCE|CASE|WHEN|THEN|ELSE|END|WITH|UNION|ALL|EXISTS|INSERT|UPDATE|DELETE|CREATE|TABLE|INDEX)\b/gi;
  const tables = /\b(stars|planets|missions|planet_candidates|neo_close_approaches)\b/g;

  return sql
    .replace(/--[^\n]*/g, m => `<span class="cmt">${m}</span>`)
    .replace(/'[^']*'/g,  m => `<span class="str">${m}</span>`)
    .replace(/\b\d+\.?\d*\b/g, m => `<span class="num">${m}</span>`)
    .replace(tables, m => `<span class="tbl">${m}</span>`)
    .replace(keywords, m => `<span class="kw">${m.toUpperCase()}</span>`);
}

// ── Render result card ────────────────────────────────────
function renderCard(data) {
  const card = document.createElement('div');
  card.className = 'result-card';

  // Question row with delete button
  const q = document.createElement('div');
  q.className = 'card-question';

  const qText = document.createElement('span');
  qText.className = 'card-question-text';
  qText.textContent = data.question;

  const del = document.createElement('button');
  del.className = 'btn-delete';
  del.title = 'Delete';
  del.textContent = '✕';
  del.onclick = () => {
    card.style.transition = 'opacity 0.2s, transform 0.2s';
    card.style.opacity = '0';
    card.style.transform = 'translateY(-8px)';
    setTimeout(() => card.remove(), 200);
  };

  q.appendChild(qText);

  if (data.results && data.results.length > 0) {
    const csv = document.createElement('button');
    csv.className = 'btn-csv';
    csv.title = 'Download CSV';
    csv.textContent = '↓ CSV';
    csv.onclick = () => {
      const header = data.columns.join(',');
      const rows = data.results.map(row =>
        data.columns.map(col => {
          const v = row[col];
          if (v === null || v === undefined) return '';
          const s = String(v);
          return s.includes(',') || s.includes('"') || s.includes('\n')
            ? `"${s.replace(/"/g, '""')}"` : s;
        }).join(',')
      );
      const blob = new Blob([[header, ...rows].join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `query_${Date.now()}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    };
    q.appendChild(csv);
  }

  q.appendChild(del);
  card.appendChild(q);

  // Answer
  const ans = document.createElement('div');
  ans.className = 'card-answer' + (data.error ? ' error' : '');
  ans.textContent = data.error ? `Error: ${data.error}` : data.answer;
  card.appendChild(ans);

  // SQL toggle
  if (data.sql) {
    const toggle = document.createElement('div');
    toggle.className = 'sql-toggle';
    toggle.innerHTML = `<span class="arrow">▶</span> Generated SQL`;

    const block = document.createElement('div');
    block.className = 'sql-block';
    block.innerHTML = `<pre>${highlightSQL(data.sql)}</pre>`;

    toggle.onclick = () => {
      const open = block.classList.toggle('open');
      toggle.classList.toggle('open', open);
    };

    card.appendChild(toggle);
    card.appendChild(block);
  }

  // Results table
  if (data.results && data.results.length > 0) {
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';

    const tbl = document.createElement('table');
    const thead = document.createElement('thead');
    const hrow = document.createElement('tr');
    data.columns.forEach(col => {
      const th = document.createElement('th');
      th.textContent = col;
      hrow.appendChild(th);
    });
    thead.appendChild(hrow);
    tbl.appendChild(thead);

    const tbody = document.createElement('tbody');
    data.results.forEach(row => {
      const tr = document.createElement('tr');
      data.columns.forEach(col => {
        const td = document.createElement('td');
        const val = row[col];
        td.textContent = val === null ? '—' : typeof val === 'number' ? (Number.isInteger(val) ? val : parseFloat(val.toFixed(4))) : val;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    card.appendChild(wrap);

    const rc = document.createElement('div');
    rc.className = 'row-count';
    rc.textContent = `${data.results.length} row${data.results.length !== 1 ? 's' : ''} returned`;
    card.appendChild(rc);
  }

  return card;
}

// ── Loading card ──────────────────────────────────────────
function renderLoading() {
  const card = document.createElement('div');
  card.className = 'loading-card';
  card.innerHTML = `
    <div class="orbit">
      <div class="orbit-ring"></div>
      <div class="orbit-dot"></div>
    </div>
    <div class="loading-text">QUERYING THE COSMOS...</div>
  `;
  return card;
}

// ── Submit ────────────────────────────────────────────────
async function submitQuery() {
  const input = document.getElementById('question');
  const question = input.value.trim();
  if (!question) return;

  const btn = document.getElementById('submit');
  btn.disabled = true;
  input.value = '';

  const history = document.getElementById('history');
  const loader = renderLoading();
  history.insertBefore(loader, history.firstChild);

  try {
    const res = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();
    loader.replaceWith(renderCard(data));
  } catch (e) {
    loader.replaceWith(renderCard({
      question,
      answer: '',
      sql: '',
      results: [],
      columns: [],
      error: 'Network error — is the backend running?',
    }));
  }

  btn.disabled = false;
  input.focus();
}

document.getElementById('submit').onclick = submitQuery;
document.getElementById('question').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitQuery();
});
</script>
</body>
</html>
